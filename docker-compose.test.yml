services:
  test-db:
    image: mariadb:lts
    environment:
      MYSQL_ROOT_PASSWORD: test_pass
      MYSQL_ROOT_HOST: "%"
    healthcheck:
      test: ["CMD", "mariadb-admin", "-uroot", "-ptest_pass", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: "no"

  test-backend:
    image: golang:1.24-alpine
    working_dir: /app
    environment:
      DB_HOST: test-db
      DB_PORT: "3306"
      DB_R_USER: root
      DB_R_PASSWORD: test_pass
      DB_META: test_course_scheduler_meta
    volumes:
      - ./backend:/app
    depends_on:
      test-db:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        go mod download && go test -tags=integration ./... -v -count=1
    restart: "no"
